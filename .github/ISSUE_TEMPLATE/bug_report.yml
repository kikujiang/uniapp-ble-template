name: Bug report
description: 提交缺陷反馈
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: module
    attributes:
      label: 模块
      description: 请选择涉及模块
      options:
        - bushuqi
        - cockroach
        - core/shared
        - 其他
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: 运行环境
      description: 系统、Node、包管理器、平台版本等
      placeholder: 例如 macOS 14 / Node 20 / pnpm 9 / 微信开发者工具 1.06
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按步骤描述如何复现
      placeholder: |
        1. 执行 ...
        2. 打开 ...
        3. 看到报错 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志/截图
      description: 粘贴报错日志或上传截图
    validations:
      required: false
